apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: transaction-service
          image: 494459347674.dkr.ecr.us-east-1.amazonaws.com/transaction-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
