name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.236.237.105
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/enterprise-devops-platform/app/transaction-service
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true
            sudo git pull
            sudo docker build -t app .
            sudo docker run -d -p 5001:5000 app
